services:
  - type: web
    name: antigravity-auth-manager
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_IDS
        sync: false
      - key: ANTIGRAVITY_CLIENT_ID
        sync: false
      - key: ANTIGRAVITY_CLIENT_SECRET
        sync: false
      - key: ANTIGRAVITY_REDIRECT_URI
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
